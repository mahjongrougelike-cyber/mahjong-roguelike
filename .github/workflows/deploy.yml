name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install love.js
        run: npm install -g love.js

      - name: Package game as .love file
        run: |
          zip -r game.love . \
            -x "*.dll" \
            -x "*.def" \
            -x ".git/*" \
            -x ".vscode/*" \
            -x ".github/*" \
            -x "*.love" \
            -x "dist/*" \
            -x "build/*" \
            -x "assets/tiles/svg/*"

      - name: Build web version with love.js
        run: love.js game.love dist --title "Mahjong Roguelike" --compatibility

      - name: Ensure game.love is in dist
        run: cp game.love dist/game.love

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
